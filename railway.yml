# railway.yml — One-click deployment reference for Railway
# Note: Railway templates are created via the UI template composer.
# This file documents the intended service topology, variables, and
# infrastructure so it can be reproduced via the Railway dashboard.
#
# Shared variables (AUTH_SECRET, ENCRYPTION_KEY, API keys) are defined
# once and referenced by all services that need them.

services:
  web:
    build:
      context: .
      buildCommand: pnpm install --frozen-lockfile && pnpm --filter @anima-ai/web... build
      nixpacksConfigPath: apps/web/railway.toml
    deploy:
      startCommand: pnpm --filter @anima-ai/web start
      healthcheckPath: /
      healthcheckTimeout: 30
    networking:
      public:
        domains:
          - domain: web
    variables:
      AUTH_SECRET:
        value: ${{shared.AUTH_SECRET}}
      ENCRYPTION_KEY:
        value: ${{shared.ENCRYPTION_KEY}}
      AUTH_URL:
        value: https://${{RAILWAY_PUBLIC_DOMAIN}}
      NEXT_PUBLIC_CHAT_API_URL:
        value: https://${{chat-api.RAILWAY_PUBLIC_DOMAIN}}
      DATABASE_URL:
        value: ${{Postgres.DATABASE_URL}}
      REDIS_URL:
        value: ${{Redis.REDIS_URL}}
      ANTHROPIC_API_KEY:
        value: ${{shared.ANTHROPIC_API_KEY}}
      OPENAI_API_KEY:
        value: ${{shared.OPENAI_API_KEY}}

  chat-api:
    build:
      context: .
      buildCommand: pnpm install --frozen-lockfile
      nixpacksConfigPath: apps/chat-api/railway.toml
    deploy:
      startCommand: pnpm --filter @anima-ai/chat-api start
      healthcheckPath: /health
      healthcheckTimeout: 30
    networking:
      public:
        domains:
          - domain: chat-api
    variables:
      AUTH_SECRET:
        value: ${{shared.AUTH_SECRET}}
      ENCRYPTION_KEY:
        value: ${{shared.ENCRYPTION_KEY}}
      CORS_ORIGIN:
        value: https://${{web.RAILWAY_PUBLIC_DOMAIN}}
      DATABASE_URL:
        value: ${{Postgres.DATABASE_URL}}
      REDIS_URL:
        value: ${{Redis.REDIS_URL}}
      ANTHROPIC_API_KEY:
        value: ${{shared.ANTHROPIC_API_KEY}}
      OPENAI_API_KEY:
        value: ${{shared.OPENAI_API_KEY}}

  worker:
    build:
      context: .
      buildCommand: pnpm install --frozen-lockfile
      nixpacksConfigPath: apps/worker/railway.toml
    deploy:
      startCommand: pnpm --filter @anima-ai/worker start
      restartPolicyType: ON_FAILURE
      restartPolicyMaxRetries: 3
    variables:
      AUTH_SECRET:
        value: ${{shared.AUTH_SECRET}}
      ENCRYPTION_KEY:
        value: ${{shared.ENCRYPTION_KEY}}
      DATABASE_URL:
        value: ${{Postgres.DATABASE_URL}}
      REDIS_URL:
        value: ${{Redis.REDIS_URL}}
      ANTHROPIC_API_KEY:
        value: ${{shared.ANTHROPIC_API_KEY}}
      OPENAI_API_KEY:
        value: ${{shared.OPENAI_API_KEY}}

databases:
  Postgres:
    plugin: postgresql
  Redis:
    plugin: redis

shared:
  AUTH_SECRET:
    description: Authentication secret (shared across all services)
    value: ${{secret(32)}}
  ENCRYPTION_KEY:
    description: AES-256-GCM encryption key for stored API keys (64-char hex)
    value: ${{secret(64, "abcdef0123456789")}}
  ANTHROPIC_API_KEY:
    description: Anthropic API key (optional if using OpenAI)
  OPENAI_API_KEY:
    description: OpenAI API key (optional if using Anthropic)
