# Lightweight local dev: PostgreSQL + Valkey.
# Start with: docker compose -f docker/docker-compose.local.yml up -d
# Then run: pnpm dev
# All services (web, chat-api, worker) connect to these shared instances.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: anima
      POSTGRES_USER: anima
      POSTGRES_PASSWORD: anima
    ports:
      - "5432:5432"
    volumes:
      - anima_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anima"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --requirepass anima_valkey_dev
    ports:
      - "6379:6379"
    volumes:
      - anima_local_valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "anima_valkey_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  anima_local_pgdata:
  anima_local_valkey:
