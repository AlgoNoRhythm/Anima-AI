version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: anima
      POSTGRES_USER: anima
      POSTGRES_PASSWORD: anima_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anima"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --requirepass ${VALKEY_PASSWORD:-anima_valkey_dev}
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD:-anima_valkey_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  docling:
    build:
      context: ../apps/docling-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://anima:anima_dev_password@postgres:5432/anima
      REDIS_URL: redis://:${VALKEY_PASSWORD:-anima_valkey_dev}@valkey:6379
      DOCLING_URL: http://docling:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: text-embedding-3-small
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      docling:
        condition: service_healthy

  chat-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chat-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://anima:anima_dev_password@postgres:5432/anima
      REDIS_URL: redis://:${VALKEY_PASSWORD:-anima_valkey_dev}@valkey:6379
      CHAT_API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://anima:anima_dev_password@postgres:5432/anima
      NEXT_PUBLIC_CHAT_API_URL: http://localhost:3001
      NEXTAUTH_SECRET: docker-dev-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      - chat-api

volumes:
  postgres_data:
  valkey_data:
